<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Food - Restaurant QR System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1>🍽️ Menu</h1>
            <div class="cart-icon" onclick="toggleCart()">
                🛒 <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <!-- Table Number Section -->
    <div class="container">
        <div class="table-section" id="table-section">
            <h2>Enter Table Number</h2>
            <input type="number" id="table-input" placeholder="Table Number" min="1">
            <button onclick="setTableNumber()" class="btn btn-primary">Continue</button>
        </div>
    </div>

    <!-- Menu Section -->
    <div class="container" id="menu-container" style="display: none;">
        <div class="table-badge">
            Table: <span id="table-display"></span>
        </div>
        
        <div class="menu-grid" id="menu-grid">
            <!-- Menu items will be loaded here -->
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-btn" onclick="toggleCart()">✕</button>
        </div>
        
        <div class="cart-items" id="cart-items">
            <p class="empty-cart">Your cart is empty</p>
        </div>
        
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total">₹0</span>
            </div>
            <button class="btn btn-primary btn-block" onclick="placeOrder()">Place Order</button>
        </div>
    </div>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

    <!-- Loading Spinner -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize page
        window.onload = function() {
            checkTableNumber();
        };
    </script>
</body>
</html>
